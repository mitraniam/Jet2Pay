  <!-- Text: 2 -->
  <text x="108" y="62" font-family="'Noto Sans', Arial, sans-serif" font-weight="800" font-size="48" fill="#C94488" letter-spacing="-1">2</text>
  <!-- Text: Pay -->
  <text x="138" y="62" font-family="'Noto Sans', Arial, sans-serif" font-weight="800" font-size="48" fill="#7B2D8E" letter-spacing="-1">Pay</text>
