<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="jet2pay-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8672C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C94488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2D8E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plane-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8672C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2D8E;stop-opacity:1" />
